<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vale Joyas | Everyday Jewelry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #fdfbf7; 
            color: #2c2c2c; 
            line-height: 1.6;
        }

        /* Estética inspirada en la imagen */
        header { 
            background: #fff;
            padding: 60px 20px; 
            text-align: center;
            border-bottom: 1px solid #e5d5c5;
        }
        
        .brand-name { 
            font-family: 'Cinzel', serif;
            font-size: 3rem; 
            letter-spacing: 8px; 
            color: #b08d57;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .sub-brand {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 20px;
            display: block;
        }

        .hero-text {
            max-width: 600px;
            margin: 20px auto;
            font-size: 1.1rem;
            font-weight: 300;
            color: #444;
            font-style: italic;
        }

        .tagline {
            background-color: #1a1a1a;
            color: #fff;
            padding: 10px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 20px;
        }

        .container { 
            max-width: 1100px; 
            margin: 50px auto; 
            padding: 0 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 40px; 
        }
        
        .card { 
            background: #fff; 
            overflow: hidden; 
            transition: all 0.4s ease;
            border: 1px solid #f2ece4;
        }
        
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(176,141,87,0.1); }
        
        .card img { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; 
            filter: sepia(10%);
        }
        
        .card-content { padding: 30px; text-align: center; }
        .card-content h3 { 
            font-family: 'Cinzel', serif;
            font-size: 1.3rem; 
            margin-bottom: 10px; 
            color: #1a1a1a; 
        }
        
        .price-tag { 
            font-size: 1.2rem; 
            color: #b08d57; 
            font-weight: 600; 
            display: block;
            margin-bottom: 20px;
        }
        
        .btn-wsap { 
            display: block; 
            background-color: #b08d57; 
            color: white; 
            padding: 15px; 
            text-decoration: none; 
            font-weight: 600;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: background 0.3s;
        }
        .btn-wsap:hover { background-color: #1a1a1a; }
        
        footer { 
            text-align: center; 
            padding: 80px 20px; 
            color: #a0a0a0;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <div class="brand-name">Vale Joyas</div>
    <span class="sub-brand">Everyday Jewelry</span>
    
    <p class="hero-text">
        "Joyas pensadas para vos: fuertes, versátiles y con brillo propio ✨"
    </p>
    
    <div class="tagline">A prueba de agua, vida y planes</div>
</header>

<div class="container">
    <!-- Producto 1 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1611085510594-7bc63866898d?q=80&w=600" alt="Anillo Dorado">
        <div class="card-content">
            <h3>Anillo Classic Gold</h3>
            <span class="price-tag">$1.950</span>
            <a href="https://wa.me/59896438057?text=Hola!%20Me%20interesa%20el%20Anillo%20Classic%20Gold" class="btn-wsap" target="_blank">Consultar</a>
        </div>
    </div>

    <!-- Producto 2 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1598560945807-1cfda9638e49?q=80&w=600" alt="Cadenita">
        <div class="card-content">
            <h3>Cadenita Minimal</h3>
            <span class="price-tag">$2.400</span>
            <a href="https://wa.me/59896438057?text=Hola!%20Me%20interesa%20la%20Cadenita%20Minimal" class="btn-wsap" target="_blank">Consultar</a>
        </div>
    </div>

    <!-- Producto 3 -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?q=80&w=600" alt="Reloj">
        <div class="card-content">
            <h3>Reloj Signature</h3>
            <span class="price-tag">$4.800</span>
            <a href="https://wa.me/59896438057?text=Hola!%20Me%20interesa%20el%20Reloj%20Signature" class="btn-wsap" target="_blank">Consultar</a>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 VALE JOYAS | Envíos a todo el país</p>
</footer>

</body>
</html>
